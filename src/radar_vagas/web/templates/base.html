<!doctype html>
<html lang="pt-BR" data-theme="{{ ui.theme_preference }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Radar de Vagas{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
    <script src="{{ url_for('static', path='app.js') }}" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Radar de Vagas</a>
      <nav class="nav" aria-label="Principal">
        <a href="/">Dashboard</a>
        <a href="/jobs">Vagas</a>
        <a href="/applications">Candidaturas</a>
        <a href="/agenda">Agenda</a>
        <a href="/profile">Perfil</a>
        <a href="/sources">Fontes</a>
      </nav>
    </header>
    <main class="shell">
      {% if message %}
        <div class="notice">{{ message }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
