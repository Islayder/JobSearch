{% extends "base.html" %}
{% block title %}Editar evento - Radar de Vagas{% endblock %}
{% block content %}
  <section class="page-title">
    <div>
      <h1>Editar evento</h1>
      <p>{{ event.confirmation_status|label }}</p>
    </div>
    <a class="button secondary" href="/agenda">Voltar</a>
  </section>

  <form class="card" action="/agenda/events/{{ event.id }}/edit" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="field">
      <label for="title">Titulo</label>
      <input id="title" name="title" value="{{ event.title }}" required>
    </div>
    <div class="field">
      <label for="starts_at">Inicio</label>
      <input id="starts_at" name="starts_at" type="datetime-local">
    </div>
    <div class="field">
      <label for="ends_at">Fim</label>
      <input id="ends_at" name="ends_at" type="datetime-local">
    </div>
    <div class="field">
      <label for="location">Local</label>
      <input id="location" name="location" value="{{ event.location or '' }}">
    </div>
    <div class="field">
      <label for="meeting_url">Link</label>
      <input id="meeting_url" name="meeting_url" value="{{ event.meeting_url or '' }}">
    </div>
    <div class="field">
      <label for="notes">Notas</label>
      <textarea id="notes" name="notes">{{ event.notes or '' }}</textarea>
    </div>
    <button type="submit">Salvar</button>
  </form>
{% endblock %}
