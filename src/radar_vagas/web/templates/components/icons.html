      <circle cx="11" cy="11" r="7"></circle><path d="M20 20l-4-4"></path>
    {% elif name == "menu" %}
      <path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h16"></path>

      <path d="M6 6l12 12"></path><path d="M18 6L6 18"></path>
    {% elif name == "check" %}
      <path d="M20 6L9 17l-5-5"></path>
    {% elif name == "alert" %}

    {% elif name == "info" %}
      <circle cx="12" cy="12" r="9"></circle><path d="M12 11v6"></path><path d="M12 7h.01"></path>
    {% elif name == "star" %}
      <path d="M12 3l2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.2 6.4 20.2 7.5 14 3 9.6l6.2-.9L12 3z"></path>

      <path d="M12 5v14"></path><path d="M5 12h14"></path>
    {% elif name == "arrow-right" %}
      <path d="M5 12h14"></path><path d="M13 6l6 6-6 6"></path>
