name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python 3.12
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev,web]"

      - name: Pytest
        run: python -m pytest

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy src
